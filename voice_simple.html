<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音输入 - 极简测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 24px; border-radius: 20px; margin-bottom: 24px; 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .header p { font-size: 16px; opacity: 0.9; }
        
        .voice-panel {
            background: #1e293b; border-radius: 20px; padding: 32px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); border: 1px solid #334155;
            margin-bottom: 24px;
        }
        
        .voice-btn {
            width: 100px; height: 100px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            color: white; font-size: 36px; cursor: pointer;
            margin: 0 auto 20px; display: block;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
        }
        .voice-btn:hover { transform: scale(1.05); box-shadow: 0 12px 30px rgba(16, 185, 129, 0.6); }
        .voice-btn.recording { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); }
        
        .voice-status {
            text-align: center; font-size: 18px; margin: 20px 0;
            padding: 16px; background: rgba(255,255,255,0.05); 
            border-radius: 12px; border: 1px solid #475569;
        }
        
        .text-area {
            width: 100%; min-height: 120px; padding: 16px;
            background: #0f172a; border: 2px solid #475569; border-radius: 12px;
            color: #f1f5f9; font-size: 16px; resize: vertical; margin-bottom: 20px;
        }
        
        .btn-group { display: flex; gap: 16px; justify-content: center; }
        .btn {
            padding: 12px 32px; border-radius: 12px; border: none; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
            color: white; 
        }
        .btn-secondary {
            background: #334155; color: #cbd5e1; border: 1px solid #475569;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        .result-box {
            background: #1e293b; border-radius: 16px; padding: 24px;
            margin-top: 24px; border: 1px solid #475569;
            display: none;
        }
        .result-box.show { display: block; }
        
        .log { margin-top: 24px; padding: 16px; background: rgba(0,0,0,0.3); 
               border-radius: 12px; font-family: monospace; font-size: 14px; }
        .log-item { margin-bottom: 8px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
        
        .test-buttons { margin-top: 32px; text-align: center; }
        .test-btn { padding: 10px 20px; margin: 0 10px; border-radius: 8px; 
                    border: none; background: #475569; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 语音输入模块 - 极简测试版</h1>
            <p>此页面专门测试语音输入功能，排除其他干扰</p>
        </div>
        
        <div class="voice-panel">
            <h2 style="text-align:center; margin-bottom:24px; color:#e2e8f0;">语音输入测试</h2>
            
            <!-- 语音按钮 -->
            <button id="voiceBtn" class="voice-btn" onclick="toggleVoice()">🎤</button>
            <div id="voiceStatus" class="voice-status">点击上方按钮开始语音输入</div>
            
            <!-- 文本输入（备用） -->
            <h3 style="margin:24px 0 16px; color:#cbd5e1;">📝 文本输入（备用）</h3>
            <textarea id="textInput" class="text-area" 
                placeholder="也可以直接输入文本，例如：我有一个同事张三，我们一起做过湖北电力数字化审计项目..."></textarea>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="analyzeText()">🤖 AI分析</button>
                <button class="btn btn-secondary" onclick="clearText()">🗑️ 清空</button>
            </div>
            
            <!-- 结果显示 -->
            <div id="resultBox" class="result-box">
                <h3 style="margin-bottom:16px; color:#e2e8f0;">📊 AI分析结果</h3>
                <div id="resultContent"></div>
            </div>
        </div>
        
        <!-- 诊断日志 -->
        <div class="log">
            <h3 style="margin-bottom:16px; color:#cbd5e1;">🔍 系统诊断日志</h3>
            <div id="logArea"></div>
        </div>
        
        <!-- 测试按钮 -->
        <div class="test-buttons">
            <button class="test-btn" onclick="runDiagnostics()">运行系统诊断</button>
            <button class="test-btn" onclick="checkVue()">检查Vue.js</button>
            <button class="test-btn" onclick="checkSpeechAPI()">检查语音API</button>
        </div>
    </div>

    <script>
        // 系统日志
        const logArea = document.getElementById('logArea');
        function log(message, type = 'info') {
            const item = document.createElement('div');
            item.className = `log-item ${type}`;
            item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(item);
            logArea.scrollTop = logArea.scrollHeight;
        }
        
        // 语音状态
        let isRecording = false;
        let recognition = null;
        let voiceText = '';
        
        // 诊断函数
        function runDiagnostics() {
            log('开始系统诊断...', 'info');
            
            // 1. 检查Vue.js
            checkVue();
            
            // 2. 检查语音API
            checkSpeechAPI();
            
            // 3. 检查页面元素
            if (document.getElementById('voiceBtn')) {
                log('✅ 语音按钮元素存在', 'success');
            } else {
                log('❌ 语音按钮元素不存在', 'error');
            }
            
            // 4. 检查文本输入框
            if (document.getElementById('textInput')) {
                log('✅ 文本输入框元素存在', 'success');
            } else {
                log('❌ 文本输入框元素不存在', 'error');
            }
            
            log('系统诊断完成', 'info');
        }
        
        function checkVue() {
            if (typeof Vue !== 'undefined') {
                log(`✅ Vue.js已加载 (版本: ${Vue.version || '未知'})`, 'success');
                if (typeof Vue.createApp !== 'undefined') {
                    log('✅ Vue.createApp可用', 'success');
                } else {
                    log('⚠️ Vue.createApp不可用', 'error');
                }
            } else {
                log('❌ Vue.js未加载', 'error');
                log('请确保vue3.min.js文件存在且路径正确', 'info');
            }
        }
        
        function checkSpeechAPI() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                log('✅ 浏览器支持语音识别API', 'success');
                log(`API类型: ${window.SpeechRecognition ? '标准' : 'webkit'}`, 'info');
                
                try {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    const testRecognition = new SpeechRecognition();
                    log('✅ 语音识别对象创建成功', 'success');
                    log(`支持语言: ${testRecognition.lang || '未设置'}`, 'info');
                } catch (error) {
                    log(`❌ 语音识别初始化失败: ${error.message}`, 'error');
                }
            } else {
                log('⚠️ 浏览器不支持语音识别API', 'error');
                log('语音输入功能将无法使用，请使用文本输入', 'info');
            }
        }
        
        // 语音功能
        function toggleVoice() {
            if (isRecording) {
                stopVoice();
            } else {
                startVoice();
            }
        }
        
        function startVoice() {
            if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                log('❌ 浏览器不支持语音识别，请使用文本输入', 'error');
                document.getElementById('voiceStatus').textContent = '浏览器不支持语音识别';
                return;
            }
            
            try {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';
                
                recognition.onstart = function() {
                    isRecording = true;
                    document.getElementById('voiceBtn').classList.add('recording');
                    document.getElementById('voiceBtn').textContent = '⏹';
                    document.getElementById('voiceStatus').textContent = '🎤 正在聆听，请说话...';
                    log('语音识别已启动', 'success');
                };
                
                recognition.onresult = function(event) {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }
                    voiceText = transcript;
                    document.getElementById('textInput').value = voiceText;
                    log(`识别到语音: ${transcript.substring(0, 50)}...`, 'info');
                };
                
                recognition.onend = function() {
                    isRecording = false;
                    document.getElementById('voiceBtn').classList.remove('recording');
                    document.getElementById('voiceBtn').textContent = '🎤';
                    document.getElementById('voiceStatus').textContent = '语音识别完成';
                    
                    if (voiceText.trim()) {
                        log('语音识别完成，开始AI分析...', 'info');
                        analyzeText();
                    } else {
                        log('未识别到有效语音', 'warning');
                    }
                };
                
                recognition.onerror = function(event) {
                    log(`语音识别错误: ${event.error}`, 'error');
                    document.getElementById('voiceStatus').textContent = `语音识别错误: ${event.error}`;
                    isRecording = false;
                    document.getElementById('voiceBtn').classList.remove('recording');
                    document.getElementById('voiceBtn').textContent = '🎤';
                };
                
                recognition.start();
                log('正在启动语音识别...', 'info');
                
            } catch (error) {
                log(`语音识别启动失败: ${error.message}`, 'error');
                document.getElementById('voiceStatus').textContent = '语音识别启动失败';
            }
        }
        
        function stopVoice() {
            if (recognition) {
                try {
                    recognition.stop();
                    log('已停止语音识别', 'info');
                } catch (error) {
                    log(`停止语音识别时出错: ${error.message}`, 'error');
                }
            }
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('voiceBtn').textContent = '🎤';
        }
        
        function analyzeText() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                log('请输入文本内容', 'warning');
                return;
            }
            
            log(`正在分析文本: ${text.substring(0, 30)}...`, 'info');
            document.getElementById('voiceStatus').textContent = '正在分析文本内容...';
            
            // 模拟AI分析（实际项目中会调用真正的AI API）
            setTimeout(() => {
                const resultBox = document.getElementById('resultBox');
                const resultContent = document.getElementById('resultContent');
                
                resultContent.innerHTML = `
                    <div style="background:#10b98120; padding:16px; border-radius:12px; margin-bottom:16px;">
                        <h4 style="color:#10b981; margin-bottom:8px;">✅ 分析成功！</h4>
                        <p>已识别到以下实体：</p>
                        <ul style="margin-top:12px; padding-left:20px;">
                            <li><strong>人员</strong>: 张三 (同事)</li>
                            <li><strong>项目</strong>: 湖北电力数字化审计项目</li>
                            <li><strong>客户</strong>: 湖北电力 (电力行业)</li>
                        </ul>
                    </div>
                    <div style="background:#3b82f620; padding:12px; border-radius:8px;">
                        <p style="font-size:14px; color:#cbd5e1;">这是测试结果，实际会调用智谱AI API进行智能分析</p>
                    </div>
                `;
                
                resultBox.classList.add('show');
                log('AI分析完成 (测试模式)', 'success');
                document.getElementById('voiceStatus').textContent = '分析完成！';
            }, 1500);
        }
        
        function clearText() {
            document.getElementById('textInput').value = '';
            voiceText = '';
            document.getElementById('resultBox').classList.remove('show');
            log('已清空文本输入', 'info');
            document.getElementById('voiceStatus').textContent = '文本已清空';
        }
        
        // 页面加载时运行诊断
        window.addEventListener('load', function() {
            log('页面加载完成', 'success');
            runDiagnostics();
        });
    </script>
</body>
</html>
